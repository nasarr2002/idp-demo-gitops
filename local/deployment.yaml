apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-demo-app
  labels:
    app: idp-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: idp-demo-app
  template:
    metadata:
      labels:
        app: idp-demo-app
    spec:
      containers:
        - name: idp-demo-app
          image: nas20/idp-demo-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: postgres-service
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD